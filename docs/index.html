<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Studygroup — Log study group meetups, who attended, and what was covered.</title>
<style>
  body {
    margin: 0;
    background: #081415;
    color: #f2f4f8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .wrap { max-width: 560px; padding: 40px 24px; }
  h1 { font-size: 2.4rem; margin-bottom: 0.3em; color: #3FB6C9; }
  p.tagline { font-size: 1.15rem; color: #cfd4de; margin-bottom: 2em; }
  .feature { background: rgba(255,255,255,0.04); border-radius: 16px; padding: 20px; margin-bottom: 12px; text-align: left; }
  .feature h3 { margin: 0 0 6px 0; color: #3FB6C9; font-size: 1rem; }
  .feature p { margin: 0; color: #b8bec9; font-size: 0.95rem; }
  footer { margin-top: 2.5em; font-size: 0.85rem; color: #7d838f; }
  a { color: #3FB6C9; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #3FB6C955 0%, #3FB6C900 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Studygroup</h1>
  <p class="tagline">Log study group meetups, who attended, and what was covered.</p>
  <div class="feature">
    <h3>Free</h3>
    <p>Meetup log with attendees and topics covered</p>
  </div>
  <div class="feature">
    <h3>Recurring Reminders</h3>
    <p>Set recurring meetup reminders and export your topic history.</p>
  </div>
  <footer>
    <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
    <p>Contact: <a href="mailto:s0533495227@gmail.com">s0533495227@gmail.com</a></p>
  </footer>
</div>
</body>
</html>
