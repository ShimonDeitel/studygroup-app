name: Studygroup
options:
  bundleIdPrefix: com.shimondeitel.studygroup
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Studygroup:
    type: application
    platform: iOS
    sources:
      - path: Studygroup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studygroup
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Studygroup/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StudygroupTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StudygroupTests
      - path: Studygroup.storekit
    dependencies:
      - target: Studygroup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studygroup.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StudygroupUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StudygroupUITests
    dependencies:
      - target: Studygroup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studygroup.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Studygroup:
    build:
      targets:
        Studygroup: all
        StudygroupTests: [test]
        StudygroupUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Studygroup.storekit
    test:
      config: Debug
      storeKitConfiguration: Studygroup.storekit
      targets:
        - StudygroupTests
        - StudygroupUITests
    archive:
      config: Release
